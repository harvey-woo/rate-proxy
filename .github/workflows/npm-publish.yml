name: Node.js Package

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack yarn install --immutable
      - run: corepack yarn build
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ""
